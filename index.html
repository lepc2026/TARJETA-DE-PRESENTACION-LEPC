<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarjeta LEPC</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #0b1020;
        font-family: Arial, sans-serif;
    }

    .container {
        text-align: center;
        color: white;
    }

    h2 {
        font-size: 18px;
        font-weight: 400;
        margin-bottom: 20px;
        opacity: 0.9;
    }

    .card {
        width: 340px;
        height: 210px;
        perspective: 1000px;
        cursor: pointer;
        margin: auto;
    }

    .card-inner {
        width: 100%;
        height: 100%;
        transition: transform 0.8s;
        transform-style: preserve-3d;
        border-radius: 15px;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
    }

    .card.flipped .card-inner {
        transform: rotateY(180deg);
    }

    .card-front, .card-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 15px;
        overflow: hidden;
    }

    .card-front img, .card-back img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .card-back {
        transform: rotateY(180deg);
    }

    .note {
        margin-top: 15px;
        font-size: 14px;
        opacity: 0.7;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Toca la tarjeta para voltear</h2>

    <div class="card" onclick="this.classList.toggle('flipped')">
        <div class="card-inner">
            
            <div class="card-front">
                <img src="frente.jpg" alt="Frente tarjeta">
            </div>

            <div class="card-back">
                <img src="reverso.jpg" alt="Reverso tarjeta">
            </div>

        </div>
    </div>

    <div class="note">LEPC Biomedical</div>
</div>

</body>
</html>
